# ===========================================================
# MXSuite — Development Overlay
# ===========================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Adds: exposed ports, dev defaults, debug settings,
#        observability stack, MailHog for email testing.
# ===========================================================

services:
  postgres:
    ports:
      - "${POSTGRES_PORT_HOST:-5432}:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mxsuite_dev}

  redis:
    ports:
      - "${REDIS_PORT_HOST:-6379}:6379"

  mxsuite-api:
    environment:
      SPRING_PROFILES_ACTIVE: docker,dev
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mxsuite_dev}
      JWT_SECRET: ${JWT_SECRET:-mxsuite-dev-secret-key-change-in-production-must-be-at-least-256-bits}
      MXSUITE_ADMIN_PASSWORD: ${MXSUITE_ADMIN_PASSWORD:-Admin123!}
      # Java remote debug
      JAVA_TOOL_OPTIONS: >-
        -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      # MailHog SMTP
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_AUTH: "false"
      SMTP_STARTTLS: "false"
    ports:
      - "${API_PORT_HOST:-8080}:8080"
      - "${DEBUG_PORT_HOST:-5005}:5005"

  # =====================================================
  # MailHog — Email testing (catches all outgoing mail)
  # =====================================================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mxsuite-mailhog
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    restart: unless-stopped

