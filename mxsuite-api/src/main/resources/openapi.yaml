      description: Returns the authenticated user's full profile including computed fields.
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'

    put:
      tags: [Profile]
      summary: Update current user's profile
      description: Update own firstName, lastName, title, and bio.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
            example:
              firstName: John
              lastName: Smith
              title: Director of Operations
              bio: Managing data migration projects
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'

  /api/profile/password:
    put:
      tags: [Profile]
      summary: Change password
      description: Change the authenticated user's password. Requires current password verification.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
            example:
              currentPassword: oldPassword123
              newPassword: newSecurePass456!
      responses:
        '200':
          description: Password changed successfully
        '400':
          description: Current password is incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

