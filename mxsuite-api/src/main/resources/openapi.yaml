      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [PENDING, ACCEPTED, CANCELLED, EXPIRED]
      responses:
        '200':
          description: Paginated list of invitations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageInvitation'

    post:
      tags: [Invitations]
      summary: Send an invitation
      description: Invite a user to join the current tenant. Sends an email with an accept link.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvitationRequest'
            example:
              email: newuser@example.com
              role: TENANT_USER
      responses:
        '201':
          description: Invitation created and email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
        '409':
          description: User already exists or pending invitation exists

  /api/invitations/{id}/cancel:
    post:
      tags: [Invitations]
      summary: Cancel a pending invitation
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Invitation cancelled
        '404':
          description: Invitation not found

  /api/invitations/{id}/resend:
    post:
      tags: [Invitations]
      summary: Resend an invitation email
      description: Resends the invitation email and extends the expiration.
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Invitation resent
        '404':
          description: Invitation not found

  /api/invitations/accept:
    post:
      tags: [Invitations]
      summary: Accept an invitation
      description: Accept an invitation using the token from the email. Creates a new user account.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInvitationRequest'
            example:
              token: abc123def456
              firstName: Jane
              lastName: Doe
              password: SecurePass123!
      responses:
        '200':
          description: Account created and invitation accepted
        '400':
          description: Token expired or invalid

  # ──────────────────────────────────────────────
  # Onboarding
  # ──────────────────────────────────────────────
  /api/onboarding:
    get:
      tags: [Onboarding]
      summary: Get current onboarding
      description: Returns the onboarding record for the current tenant.
      responses:
        '200':
          description: Onboarding data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Onboarding'
        '404':
          description: No onboarding exists for this tenant

    post:
      tags: [Onboarding]
      summary: Create a new onboarding
      description: Creates a new onboarding record for the current tenant (step 0, status WELCOME).
      responses:
        '200':
          description: Onboarding created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Onboarding'

  /api/onboarding/{id}:
    put:
      tags: [Onboarding]
      summary: Update onboarding step/status
      description: Advance or retreat the onboarding wizard step.
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            example:
              currentStep: 2
              status: MAPPING
      responses:
        '200':
          description: Onboarding updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Onboarding'

  /api/onboarding/{id}/upload:
    post:
      tags: [Onboarding]
      summary: Upload data file
      description: Upload a CSV or Excel file for onboarding. Parses headers and detects row count.
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: File parsed successfully
          content:
            application/json:
              example:
                id: "55555555-5555-5555-5555-555555555555"
                originalFilename: members.xlsx
                rowCount: 1500
                sourceColumns: [Name, Email, Phone, Address]
                needsSheetSelection: false
        '200 ':
          description: Multi-sheet Excel — needs sheet selection
          content:
            application/json:
              example:
                needsSheetSelection: true
                sheets:
                  - index: 0
                    name: Members
                    rowCount: 1500
                  - index: 1
                    name: Companies
                    rowCount: 320

  /api/onboarding/{id}/select-sheet:
    post:
      tags: [Onboarding]
      summary: Select Excel sheet
      description: For multi-sheet Excel files, select which sheet to use.
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            example:
              sheetIndex: 0
      responses:
        '200':
          description: Sheet selected and parsed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Onboarding'

  /api/onboarding/{id}/preview:
    get:
      tags: [Onboarding]
      summary: Preview uploaded data
      description: Returns the first few rows of the uploaded file for preview.
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Data preview
          content:
            application/json:
              example:
                headers: [Name, Email, Phone]
                rows:
                  - [John Smith, john@example.com, 555-0100]
                  - [Jane Doe, jane@example.com, 555-0200]

  /api/onboarding/{id}/mappings:
    put:
      tags: [Onboarding]
      summary: Save column mappings
      description: Save the source-to-target column mappings.
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            example:
              mappings:
                - sourceField: Name
                  targetField: fullName
                  transformation: TRIM
                - sourceField: Email
                  targetField: emailAddress
                  transformation: null
      responses:
        '200':
          description: Mappings saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Onboarding'

  /api/onboarding/{id}/submit:
    post:
      tags: [Onboarding]
      summary: Submit onboarding
      description: Mark onboarding as submitted for GrowthZone review.
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Onboarding submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Onboarding'

  /api/onboarding/{id}/reopen:
    post:
      tags: [Onboarding]
      summary: Reopen submitted onboarding
      description: Return a submitted onboarding to the mapping step for edits.
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Onboarding reopened
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Onboarding'

  /api/onboarding/{id}/reset:
    delete:
      tags: [Onboarding]
      summary: Reset onboarding
      description: Delete the onboarding and start over from scratch.
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Onboarding reset

# ══════════════════════════════════════════════
# Components
# ══════════════════════════════════════════════
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from POST /api/auth/login

  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: "22222222-2222-2222-2222-222222222222"

    projectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: p1111111-1111-1111-1111-111111111111

    planId:
      name: planId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: pl111111-1111-1111-1111-111111111111

    page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
      description: Zero-based page index

    size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: Page size

    sort:
      name: sort
      in: query
      required: false
      schema:
        type: string
      description: "Sort property,direction (e.g. createdAt,desc)"
      example: createdAt,desc

  schemas:
    # ── Auth ──
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@mxsuite.com
        password:
          type: string
          format: password
          example: admin123

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT Bearer token
        user:
          $ref: '#/components/schemas/UserDto'
        tenant:
          $ref: '#/components/schemas/TenantDto'

    UserDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        tenantId:
          type: string
          format: uuid
        avatarUrl:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true

    TenantDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        tenantType:
          $ref: '#/components/schemas/TenantType'

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
        message:
          type: string

    # ── Tenant ──
    Tenant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        tenantType:
          $ref: '#/components/schemas/TenantType'
        active:
          type: boolean
        createdBy:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        lastModifiedBy:
          type: string
          format: uuid
          nullable: true
        lastModifiedAt:
          type: string
          format: date-time

    CreateTenantRequest:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
          example: Austin Chamber of Commerce
        slug:
          type: string
          pattern: '^[a-z0-9-]+$'
          example: austin-chamber

    UpdateTenantRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
        active:
          type: boolean
          nullable: true

    # ── User ──
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        active:
          type: boolean
        avatarUrl:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
          description: Job title
        bio:
          type: string
          nullable: true
          description: Short biography (max 500 chars)
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        preferences:
          type: object
          nullable: true
          additionalProperties: true
        tenant:
          $ref: '#/components/schemas/Tenant'
        createdAt:
          type: string
          format: date-time
        lastModifiedAt:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      required: [email, firstName, lastName, password, role, tenantId]
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        password:
          type: string
          format: password
          minLength: 8
        role:
          $ref: '#/components/schemas/UserRole'
        tenantId:
          type: string
          format: uuid

    UpdateUserRequest:
      type: object
      properties:
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        role:
          $ref: '#/components/schemas/UserRole'
          nullable: true
        active:
          type: boolean
          nullable: true

    # ── Workspace ──
    Workspace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        crossTenant:
          type: boolean
        owner:
          $ref: '#/components/schemas/User'
        tenant:
          $ref: '#/components/schemas/Tenant'
        accessList:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceAccess'
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        lastModifiedAt:
          type: string
          format: date-time

    WorkspaceAccess:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user:
          $ref: '#/components/schemas/User'
        accessLevel:
          $ref: '#/components/schemas/AccessLevel'

    CreateWorkspaceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true

    ShareWorkspaceRequest:
      type: object
      required: [userId, accessLevel]
      properties:
        userId:
          type: string
          format: uuid
        accessLevel:
          $ref: '#/components/schemas/AccessLevel'

    # ── Project ──
    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        owner:
          $ref: '#/components/schemas/User'
        tenant:
          $ref: '#/components/schemas/Tenant'
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        lastModifiedAt:
          type: string
          format: date-time

    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true

    # ── Plan ──
    Plan:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/PlanStatus'
        version:
          type: integer
          minimum: 1
        definition:
          type: object
          nullable: true
          description: JSONB field mapping definition (sourceSchema, targetSchema, mappings, validationRules)
          properties:
            sourceSchema:
              type: array
              items:
                $ref: '#/components/schemas/SchemaField'
            targetSchema:
              type: array
              items:
                $ref: '#/components/schemas/SchemaField'
            mappings:
              type: array
              items:
                $ref: '#/components/schemas/FieldMapping'
            validationRules:
              type: array
              items:
                $ref: '#/components/schemas/ValidationRule'
        project:
          $ref: '#/components/schemas/Project'
        sourceAsset:
          $ref: '#/components/schemas/ProjectAsset'
          nullable: true
        createdAt:
          type: string
          format: date-time
        lastModifiedAt:
          type: string
          format: date-time

    SchemaField:
      type: object
      properties:
        name:
          type: string
          example: member_name
        type:
          type: string
          example: string
        path:
          type: string
          example: member_name

    FieldMapping:
      type: object
      properties:
        id:
          type: string
          example: m1
        sourceField:
          type: string
          example: member_name
        targetField:
          type: string
          example: fullName
        transformation:
          type: string
          description: "Pipe-delimited transformation DSL"
          example: "TRIM | TITLE_CASE"

    ValidationRule:
      type: object
      properties:
        field:
          type: string
          example: fullName
        rule:
          type: string
          example: NOT_EMPTY
        message:
          type: string
          example: Name is required

    CreatePlanRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true

    UpdateDefinitionRequest:
      type: object
      required: [definition]
      properties:
        definition:
          type: object
          description: Complete plan mapping definition

    ExecutePlanRequest:
      type: object
      required: [runType]
      properties:
        runType:
          $ref: '#/components/schemas/RunType'

    # ── PlanRun ──
    PlanRun:
      type: object
      properties:
        id:
          type: string
          format: uuid
        runType:
          $ref: '#/components/schemas/RunType'
        status:
          $ref: '#/components/schemas/RunStatus'
        planVersion:
          type: integer
        recordsProcessed:
          type: integer
          format: int64
          nullable: true
        recordsSucceeded:
          type: integer
          format: int64
          nullable: true
        recordsFailed:
          type: integer
          format: int64
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        resultSummary:
          type: object
          nullable: true
          description: JSONB summary of execution results
        errors:
          type: object
          nullable: true
          description: JSONB error details (row-level failures)
        triggeredBy:
          $ref: '#/components/schemas/User'
        plan:
          $ref: '#/components/schemas/Plan'
        createdAt:
          type: string
          format: date-time

    # ── ProjectAsset ──
    ProjectAsset:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        contentType:
          type: string
        fileSize:
          type: integer
          format: int64
          description: File size in bytes
        storagePath:
          type: string
          description: Server-side file path
        assetType:
          type: string
          enum: [DATA, DOCUMENT, TEMPLATE]
        uploadedBy:
          $ref: '#/components/schemas/User'
        project:
          $ref: '#/components/schemas/Project'
        createdAt:
          type: string
          format: date-time

    # ── AuditEvent ──
    AuditEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        actorId:
          type: string
          format: uuid
        actorName:
          type: string
        actorRole:
          type: string
        platformAction:
          type: boolean
          description: True if action was performed by a platform (GrowthZone) user
        action:
          type: string
          description: "Action type (CREATE, UPDATE, DELETE, PUBLISH, ARCHIVE, EXECUTE_DRY_RUN, EXECUTE_FULL_RUN, UPLOAD, SHARE)"
        entityType:
          type: string
          description: "Entity class name (Tenant, User, Project, Plan, PlanRun, Workspace, ProjectAsset)"
        entityId:
          type: string
          format: uuid
        entityName:
          type: string
          nullable: true
        beforeState:
          type: object
          nullable: true
          description: JSONB snapshot of entity state before change
        afterState:
          type: object
          nullable: true
          description: JSONB snapshot of entity state after change
        metadata:
          type: object
          nullable: true
        timestamp:
          type: string
          format: date-time
        ipAddress:
          type: string
          nullable: true
        traceId:
          type: string
          nullable: true
          description: OpenTelemetry trace ID for distributed trace correlation

    # ── Enums ──
    TenantType:
      type: string
      enum: [PLATFORM, CUSTOMER]

    UserRole:
      type: string
      enum: [PLATFORM_ADMIN, PLATFORM_SUPPORT, TENANT_ADMIN, TENANT_USER]

    PlanStatus:
      type: string
      enum: [DRAFT, PUBLISHED, ARCHIVED]

    RunType:
      type: string
      enum: [DRY_RUN, FULL_RUN]

    RunStatus:
      type: string
      enum: [QUEUED, RUNNING, COMPLETED, FAILED]

    AccessLevel:
      type: string
      enum: [VIEWER, EDITOR, ADMIN]

    # ── Pagination Wrappers ──
    PageTenant:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Tenant'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    PageUser:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/User'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    PageWorkspace:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Workspace'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    PageProject:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    PagePlan:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Plan'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    PagePlanRun:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/PlanRun'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    PageProjectAsset:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ProjectAsset'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    PageAuditEvent:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/AuditEvent'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    PageInvitation:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Invitation'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    # ── Tenant (new requests) ──
    CreateTenantWithOwnerRequest:
      type: object
      required: [name, slug, ownerEmail, ownerFirstName, ownerLastName, ownerPassword]
      properties:
        name:
          type: string
          example: Denver Chamber of Commerce
        slug:
          type: string
          pattern: '^[a-z0-9-]+$'
          example: denver-chamber
        ownerEmail:
          type: string
          format: email
          example: admin@denverchamber.org
        ownerFirstName:
          type: string
          example: Denver
        ownerLastName:
          type: string
          example: Admin
        ownerPassword:
          type: string
          format: password
          minLength: 8
          example: SecurePass123!

    # ── Workspace (new requests) ──
    UpdateWorkspaceRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true

    # ── Profile ──
    ProfileResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        title:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        role:
          $ref: '#/components/schemas/UserRole'
        avatarUrl:
          type: string
          nullable: true
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        tenantName:
          type: string

    UpdateProfileRequest:
      type: object
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          minLength: 1
          maxLength: 100
        title:
          type: string
          maxLength: 100
          nullable: true
        bio:
          type: string
          maxLength: 500
          nullable: true

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          format: password
          minLength: 8
        newPassword:
          type: string
          format: password
          minLength: 8

    # ── Invitation ──
    Invitation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        status:
          type: string
          enum: [PENDING, ACCEPTED, CANCELLED, EXPIRED]
        invitedBy:
          type: string
          format: uuid
        invitedByName:
          type: string
        tenantId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time

    CreateInvitationRequest:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'

    AcceptInvitationRequest:
      type: object
      required: [token, firstName, lastName, password]
      properties:
        token:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        password:
          type: string
          format: password
          minLength: 8

    # ── Onboarding ──
    Onboarding:
      type: object
      properties:
        id:
          type: string
          format: uuid
        currentStep:
          type: integer
          minimum: 0
          maximum: 4
        status:
          type: string
          enum: [WELCOME, UPLOAD, MAPPING, REVIEW, SUBMITTED, COMPLETED]
        originalFilename:
          type: string
          nullable: true
        rowCount:
          type: integer
          nullable: true
        sourceColumns:
          type: array
          items:
            type: string
          nullable: true
        sheetName:
          type: string
          nullable: true
        mappings:
          type: array
          nullable: true
          items:
            type: object
            properties:
              sourceField:
                type: string
              targetField:
                type: string
              transformation:
                type: string
                nullable: true
        lastModifiedByName:
          type: string
          nullable: true
        lastModifiedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
