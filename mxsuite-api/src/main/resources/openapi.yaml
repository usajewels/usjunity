        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Avatar uploaded
          content:
            application/json:
              example:
                avatarUrl: /api/profile/avatar/file

  /api/profile/preferences:
    get:
      tags: [Profile]
      summary: Get user preferences
      description: Returns the authenticated user's preferences (theme, notifications, display settings).
      responses:
        '200':
          description: Preferences object
          content:
            application/json:
              example:
                theme: light
                compact: false
                emailNotifications: true
                inAppNotifications: true
                weeklyDigest: false
                dateFormat: MM/DD/YYYY

    put:
      tags: [Profile]
      summary: Update user preferences
      description: Replace all preferences with the provided object.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            example:
              theme: dark
              compact: true
              emailNotifications: true
              inAppNotifications: true
              weeklyDigest: false
              dateFormat: DD/MM/YYYY
      responses:
