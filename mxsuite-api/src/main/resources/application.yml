server:
  port: 8080
  tomcat:
    threads:
      max: 200
      min-spare: 10
    mbeanregistry:
      enabled: true

spring:
  application:
    name: mxsuite-api

  profiles:
    active: ${AUTH_MODE:local}

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:mxsuite}
    username: ${POSTGRES_USER:mxsuite}
    password: ${POSTGRES_PASSWORD:mxsuite_dev}
    hikari:
      maximum-pool-size: 20

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# Actuator + Observability
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
      probes:
        enabled: true
    prometheus:
      enabled: true
    loggers:
      enabled: true
  health:
    redis:
      enabled: true
    db:
      enabled: true
    diskspace:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      instance: ${HOSTNAME:localhost}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.75, 0.95, 0.99
      slo:
        http.server.requests: 100ms, 250ms, 500ms, 1s, 2s, 5s
    enable:
      jvm: true
      process: true
      system: true
      tomcat: true
      hikaricp: true
      spring.data.repository: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
    metrics:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/metrics

  # Email (SMTP)
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS:true}

# MXSuite custom config
mxsuite:
  storage:
    type: ${STORAGE_TYPE:local}
    local:
      base-path: ${STORAGE_LOCAL_PATH:./data/files}
  security:
    jwt:
      secret: ${JWT_SECRET:}
      expiration-ms: 86400000
    trusted-proxies: ${TRUSTED_PROXIES:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004}
  platform:
    tenant-name: MXSuite Platform
  email:
    from: ${MXSUITE_EMAIL_FROM:noreply@mxsuite.com}
  app:
    base-url: ${MXSUITE_BASE_URL:http://localhost:3000}
  ai:
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    model: ${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
  bootstrap:
    admin-email: ${MXSUITE_ADMIN_EMAIL:admin@mxsuite.com}
    admin-password: ${MXSUITE_ADMIN_PASSWORD:}
    admin-first-name: ${MXSUITE_ADMIN_FIRST_NAME:Platform}
    admin-last-name: ${MXSUITE_ADMIN_LAST_NAME:Admin}
