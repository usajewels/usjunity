# Keycloak authentication profile - delegates auth to Keycloak

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/mxsuite}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/mxsuite/protocol/openid-connect/certs}

mxsuite:
  security:
    auth-mode: keycloak
    keycloak:
      realm: mxsuite
      auth-server-url: ${KEYCLOAK_URL:http://localhost:8180}
